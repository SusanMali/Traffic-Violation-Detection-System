{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-user-circle me-2"></i>Profile
            </div>
            <div class="card-body p-4 text-center">
                <i class="fas fa-user-circle fa-5x mb-3" style="color: #667eea;"></i>
                <h3>{{ user.username }}</h3>
                <p class="text-muted">{{ user.email }}</p>
                <hr>
                <ul class="list-unstyled text-start">
                    <li class="mb-2"><i class="fas fa-calendar-alt me-2"></i>Joined: {{ user.date_joined|date:"F j, Y" }}</li>
                    <li class="mb-2"><i class="fas fa-video me-2"></i>Total Videos: {{ user.videos.count }}</li>
                </ul>
                <a href="{% url 'logout' %}" class="btn btn-danger mt-3">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
